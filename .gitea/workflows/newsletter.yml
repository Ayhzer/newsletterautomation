name: Newsletter automation

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Forcer l''exécution de tous les prompts Healthcare Watch (ignore les fréquences)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        env:
          GIT_SSL_NO_VERIFY: "true"
        run: git clone https://oauth2:${{ secrets.GITEA_TOKEN }}@papageek.hopto.org:8443/ayhzer/newsletterautomation.git .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config.py from example (fallback)
        run: |
          if [ ! -f config/config.py ]; then
            cp config/config.example.py config/config.py
          fi

      - name: Run newsletter automation
        env:
          GITHUB_ACTIONS: 'true'
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          EMAIL_SOURCES: ${{ secrets.EMAIL_SOURCES }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          python src/newsletter_automation/newsletter_automation.py

  run-healthcare-watch:
    runs-on: ubuntu-latest
    needs: run-newsletter
    if: always()
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        env:
          GIT_SSL_NO_VERIFY: "true"
        run: git clone https://oauth2:${{ secrets.GITEA_TOKEN }}@papageek.hopto.org:8443/ayhzer/newsletterautomation.git .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Healthcare Watch
        env:
          GITHUB_ACTIONS: 'true'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
        run: |
          python src/newsletter_automation/healthcare_watch_runner.py

      - name: Commit execution log
        if: always()
        env:
          GIT_SSL_NO_VERIFY: "true"
        run: |
          git config --global user.email "action@gitea.local"
          git config --global user.name "Gitea Action"
          if [ -f "data/output/.last_run.json" ]; then
            git add -f data/output/.last_run.json
            git diff --cached --quiet || git commit -m "chore: update healthcare-watch execution log - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push https://oauth2:${{ secrets.GITEA_TOKEN }}@papageek.hopto.org:8443/ayhzer/newsletterautomation.git HEAD:main || true
          fi