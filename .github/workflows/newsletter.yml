name: Newsletter automation

# ⚠️  DÉSACTIVÉ - Ce workflow est désactivé sur la version générique
# La version privée (newsletterautomation-private) gère l'exécution
on:
  # schedule:
  #   # 7h UTC ≃ 8h en France en hiver
  #   - cron: "0 7 * * *"
  # workflow_dispatch: {}

jobs:
  run-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run newsletter automation
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          python src/newsletter_automation/newsletter_automation.py
