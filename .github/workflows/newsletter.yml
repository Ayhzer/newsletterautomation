name: Newsletter automation

on:
  schedule:
    # 7h UTC ≃ 8h en France en hiver
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  run-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config.py from example (fallback)
        run: |
          if [ ! -f config/config.py ]; then
            cp config/config.example.py config/config.py
          fi

      - name: Run newsletter automation
        env:
          GITHUB_ACTIONS: 'true'
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          EMAIL_SOURCES: ${{ secrets.EMAIL_SOURCES }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          python src/newsletter_automation/newsletter_automation.py

  run-healthcare-watch:
    runs-on: ubuntu-latest
    needs: run-newsletter
    if: always()
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Healthcare Watch
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          python src/newsletter_automation/healthcare_watch_runner.py

      - name: Commit execution log
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "data/output/.last_run.json" ]; then
            git add data/output/.last_run.json
            git diff --cached --quiet || git commit -m "chore: update healthcare-watch execution log - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push || true
          fi
