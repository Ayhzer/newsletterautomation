# ==================== CONFIGURATION HEALTHCARE WATCH ====================
# Ce fichier ne contient pas de secrets et peut être versionné dans Git.
# Les secrets (API keys, tokens) sont dans les variables d'environnement.

# ==================== PARAMÈTRES GÉNÉRAUX ====================
general:
  timezone: "Europe/Paris"

  # Notifications par email (Gmail API OAuth2)
  # Mettre enabled: false pour désactiver complètement les emails
  # Requiert: GOOGLE_CREDENTIALS_JSON et GOOGLE_OAUTH_TOKEN_JSON
  notifications:
    enabled: true
    email_on_error: true

# ==================== DÉFINITION DES PROMPTS ====================
# Chaque prompt = une newsletter indépendante avec sa fréquence
#
# Paramètres disponibles :
#   enabled        : true/false - activer/désactiver ce prompt
#   frequency      : "daily", "3days", "weekly", "monthly", "hourly"
#   page_title     : Titre affiché dans Notion (la date/heure sera ajoutée)
#   parent_page_id : ID de la page Notion parente (où les sous-pages seront créées)
#   prompt         : Le texte envoyé à Perplexity (rédigé comme pour un humain)
#   options        : Paramètres techniques Perplexity (model, max_tokens, temperature)

prompts:

  # Newsletter hebdomadaire - Veille réglementaire IT Santé
  weekly_regulatory_news:
    enabled: true
    frequency: "weekly"
    page_title: "veille réglementaire hebdo IT santé"
    parent_page_id: ""
    prompt: |
     Synthèse très détaillée de veille réglementaire hebdo IT santé
     France : HDS, PGSSI-S, RNIV, LAP, EHDS NIS2 et autres dispositifs.
     Mises à jour normes ISO27001 certification HDS
     hôpitaux et hébergeurs données santé.
     Format bien lisible et compréhensible pour intégrer sur une page
     Notion.
    options:
      max_tokens: 8192
      temperature: 0.3
      model: "sonar"

  # Newsletter cybersécurité - tous les 3 jours
  daily_cybersecurity:
    enabled: true
    frequency: "3days"
    page_title: "Veille cybersécurité en Santé"
    parent_page_id: ""
    prompt: |
      Synthèse très détaillée d'une alertes quotidiennes cybersécurité ANSSI CERT-FR
      hôpitaux France incidents SIH.
      Format bien lisible et compréhensible pour intégrer sur une page
      Notion.
    options:
      max_tokens: 8192
      temperature: 0.3
      model: "sonar"

